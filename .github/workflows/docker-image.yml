name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build container image (arm64, with version stamps + RouterOS repack)
        run: ./build-arm64.sh

      - name: Verify version stamp on tailscaled binary
        run: |
          docker run --rm tailscale-mikrotik-arm64:latest /usr/local/bin/tailscaled --version | tee version.txt
          if grep -q "ERR-BuildInfo" version.txt; then
            echo "::error::tailscaled reports ERR-BuildInfo — version stamping is broken"
            exit 1
          fi

      - name: Upload tailscale-arm64.tar (RouterOS-importable)
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-arm64-tar
          path: tailscale-arm64.tar
          retention-days: 14

      - name: Save Docker image for publish job
        if: startsWith(github.ref, 'refs/tags/')
        run: docker save tailscale-mikrotik-arm64:latest -o image.tar

      - name: Upload Docker image artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Tag and push to Docker Hub
        run: |
          docker tag tailscale-mikrotik-arm64:latest ${{ github.repository_owner }}/tailscale-mikrotik:${{ steps.version.outputs.VERSION }}
          docker tag tailscale-mikrotik-arm64:latest ${{ github.repository_owner }}/tailscale-mikrotik:latest
          docker push ${{ github.repository_owner }}/tailscale-mikrotik:${{ steps.version.outputs.VERSION }}
          docker push ${{ github.repository_owner }}/tailscale-mikrotik:latest
